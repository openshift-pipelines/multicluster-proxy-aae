apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-aae
  namespace: proxy-aae
  labels:
    app: proxy-aae
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy-aae
  template:
    metadata:
      labels:
        app: proxy-aae
    spec:
      serviceAccountName: proxy-aae
      containers:
      - name: proxy-aae
        image: ko://github.com/openshift-pipelines/multicluster-proxy-aae/cmd/proxy-server
        args:
        - "--tls-cert=/etc/tls/tls.crt"
        - "--tls-key=/etc/tls/tls.key"
        ports:
        - containerPort: 8080
          name: https
        env:
        - name: WORKERS_SECRET_NAMESPACE
          value: "kueue-system"
        - name: REQUEST_TIMEOUT
          value: "30s"
        - name: DEFAULT_LOG_TAIL_LINES
          value: "100"
        - name: LOG_LEVEL
          value: "2"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: tls-certs
          mountPath: "/etc/tls"
          readOnly: true
        livenessProbe:
          httpGet:
            scheme: HTTPS
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            scheme: HTTPS
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: tls-certs
        secret:
          secretName: proxy-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-aae
  namespace: proxy-aae
  labels:
    app: proxy-aae
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: proxy-server-tls
spec:
  selector:
    app: proxy-aae
  ports:
  - port: 443
    targetPort: 8080
    protocol: TCP
    name: https
  type: ClusterIP
